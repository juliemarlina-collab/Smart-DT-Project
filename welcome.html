<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Smart DT · Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@700;800;900&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#071B3D;--teal:#20C7BD;--tealDk:#147F79;--tealLt:#D9FBF8;
  --orange:#FF633D;--orangeLt:#FFF3F0;
  --yellow:#FDBA2D;--yellowLt:#FFFBEA;
  --green:#22C55E;--greenLt:#DCFCE7;
  --bg:#FAFBFC;--white:#FFFFFF;--txt:#071B3D;--sub:#53617A;--border:#E8EDF5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Poppins,sans-serif;background:#EDF0F5;padding:24px 0;color:var(--txt)}
.frame{width:min(480px,100vw);margin:0 auto;background:var(--white);border-radius:30px;min-height:92vh;overflow:hidden;box-shadow:0 8px 60px rgba(7,27,61,.14);display:flex;flex-direction:column;position:relative}
.hero{background:var(--navy);padding:24px 20px 16px;position:relative}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logo{width:42px;height:42px;border-radius:12px;background:var(--teal);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900}
.title{font-family:Nunito,sans-serif;color:#fff;font-weight:900;line-height:1.1}
.script{font-family:Pacifico,cursive;font-size:44px;color:#fff;line-height:1;margin:8px 0}
.sub{color:rgba(255,255,255,.7);font-size:12px;line-height:1.6;max-width:260px}
.hero img{position:absolute;right:-16px;bottom:-8px;width:220px;height:180px;object-fit:contain}
.content{padding:18px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.card{border:1.5px solid var(--border);border-radius:12px;padding:10px;background:#fff;text-align:center}
.card b{display:block;font-size:12px}
.card span{font-size:10px;color:var(--sub)}
.cta{background:var(--navy);color:#fff;border:none;width:100%;padding:15px;border-radius:99px;font-weight:800;cursor:pointer}
.note{margin-top:10px;font-size:12px;color:var(--sub);text-align:center}
.nav{margin-top:auto;border-top:1.5px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 6px}
.nav a{text-decoration:none;color:#94A3B8;font-size:9px;font-weight:700;text-align:center}
.nav .active{color:var(--teal)}
</style>
</head>
<body>
<div class="frame">
  <div class="hero">
    <div class="brand"><div class="logo">DT</div><div class="title">Smart DT<br/>Project</div></div>
    <div class="script">Welcome!</div>
    <p class="sub">Your guided 5-phase Design Thinking companion for FYP progress, submission, and supervisor review.</p>
    <img src="assets/assets/welcome-hero.svg" alt="Welcome hero"/>
  </div>
  <div class="content">
    <div class="cards">
      <div class="card"><b>Learn</b><span>Quick Info</span></div>
      <div class="card"><b>Quiz</b><span>Quick Check</span></div>
      <div class="card"><b>Build</b><span>Templates</span></div>
    </div>
    <button class="cta" onclick="goToDashboard()">Get Started</button>
    <div class="note">You’ll go to Login first, then Dashboard.</div>
  </div>
  <nav class="nav">
    <a class="active" href="welcome.html">Welcome</a>
    <a href="login.html">Login</a>
    <a href="dashboard.html">Home</a>
    <a href="progress.html">Progress</a>
    <a href="profile.html">Profile</a>
  </nav>
</div>
<script>
function goToDashboard(){
  var btn=document.getElementById('btn-start');
  if(btn){btn.disabled=true;btn.textContent='Preparing...';}
  try{ localStorage.setItem('df_welcome_seen','true'); }catch(e){}
  setTimeout(function(){ location.href='login.html'; },600);
}
(function(){
  var name='';
  try{ name=localStorage.getItem('df_student_name')||''; }catch(e){}
  var seen='';
  try{ seen=localStorage.getItem('df_welcome_seen')||''; }catch(e){}
  if(name && seen==='true'){
    location.href='login.html';
  }
})();
</script>
</body>
</html>
