<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Smart DT · Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#071B3D;--teal:#20C7BD;--tealDk:#147F79;--tealLt:#D9FBF8;
  --orange:#FF633D;--orangeLt:#FFF3F0;
  --yellow:#FDBA2D;--yellowLt:#FFFBEA;
  --green:#22C55E;--greenLt:#DCFCE7;
  --bg:#FAFBFC;--white:#FFFFFF;--txt:#071B3D;--sub:#53617A;--border:#E8EDF5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Poppins,sans-serif;background:var(--bg);color:var(--txt)}
.wrap{max-width:560px;margin:0 auto;min-height:100vh;background:#fff}
.hero{background:var(--navy);padding:22px 18px;color:#fff}
.name{font-family:Nunito,sans-serif;font-weight:900;font-size:24px}
.meta{font-size:12px;color:rgba(255,255,255,.7)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.stat{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.stat b{display:block;font-size:18px;color:var(--navy)}
.stat span{font-size:9px;color:var(--sub);text-transform:uppercase;font-weight:700}
.card{margin:12px 14px;background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:14px}
.card h3{font-family:Nunito,sans-serif;margin-bottom:8px}
.ach{display:flex;align-items:center;justify-content:space-between}
.badges{display:flex;gap:6px}
.badge{width:34px;height:34px;border-radius:50%;background:var(--tealLt);display:flex;align-items:center;justify-content:center}
.menu{margin:12px 14px;border:1.5px solid var(--border);border-radius:14px;overflow:hidden}
.menu a{display:flex;justify-content:space-between;padding:13px 14px;text-decoration:none;color:var(--txt);border-bottom:1px solid var(--border);font-size:13px}
.menu a:last-child{border-bottom:none}
.nav{position:sticky;bottom:0;background:#fff;border-top:1.5px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 6px}
.nav a{text-decoration:none;color:#94A3B8;font-size:9px;font-weight:700;text-align:center}
.nav .active{color:var(--teal)}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="name" id="pname">Student Name</div>
    <div class="meta" id="pmeta">REG000 · CLASS</div>
    <div class="meta" id="pproject" style="margin-top:4px;"></div>
    <div class="meta" id="pteam" style="margin-top:2px;"></div>
  </section>

  <section class="stats" id="stats"></section>

  <section class="card">
    <h3>Achievements</h3>
    <div class="ach">
      <div><b id="earned">0</b> badges earned</div>
      <div class="badges"><div class="badge">🏅</div><div class="badge">⭐</div><div class="badge">🎯</div></div>
    </div>
  </section>

  <section class="menu">
    <a href="dashboard.html"><span>Home Dashboard</span><span>›</span></a>
    <a href="progress.html"><span>Progress & Milestones</span><span>›</span></a>
    <a href="reflection.html"><span>Reflection Log</span><span>›</span></a>
    <a href="login.html"><span>Edit Student Info</span><span>›</span></a>
    <a href="#" onclick="doLogout();return false;" style="color:#EF4444;"><span>Logout</span><span>›</span></a>
  </section>

  <nav class="nav">
    <a href="welcome.html">Welcome</a>
    <a href="dashboard.html">Home</a>
    <a href="phase01-empathy.html">Learn</a>
    <a href="progress.html">Progress</a>
    <a class="active" href="profile.html">Profile</a>
  </nav>
</div>
<script>
/* ── LOCAL STORAGE ── */
function ls(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function submitted(id){return ls('df_submitted_'+id)==='1';}
var PHASES=[{id:'phase01'},{id:'phase02'},{id:'phase03'},{id:'phase04'},{id:'phase05'}];
var BADGE_DEFS=[
  {icon:'🗺️',name:'DT Explorer',condition:function(d){return d>=3;}},
  {icon:'🤝',name:'Empathy Champ',condition:function(d){return submitted('phase01');}},
  {icon:'🎯',name:'Prob. Framer',condition:function(d){return submitted('phase02');}},
  {icon:'💡',name:'Idea Generator',condition:function(d){return submitted('phase03');}},
  {icon:'🔨',name:'Proto Builder',condition:function(d){return submitted('phase04');}},
  {icon:'🧪',name:'User Tester',condition:function(d){return submitted('phase05');}},
  {icon:'🎓',name:'DT Graduate',condition:function(d){return d>=5;}},
  {icon:'📁',name:'Full Portfolio',condition:function(d){return d>=5;}}
];
function submittedCount(){var n=0;PHASES.forEach(function(p){if(submitted(p.id))n++;});return n;}
function initials(name){if(!name)return '?';var p=name.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase();}
function earnedBadges(){var done=submittedCount();return BADGE_DEFS.filter(function(b){return b.condition(done);}).length;}
function renderHeader(){
  var name=ls('df_student_name')||'Student Name';
  var reg=ls('df_reg_no')||'';var cls=ls('df_class')||'';
  var proj=ls('df_project_name')||'';var team=ls('df_team')||'';var sup=ls('df_supervisor')||'';
  document.getElementById('pname').textContent=name;
  document.getElementById('pmeta').textContent=[reg,cls].filter(Boolean).join(' · ')||'REG000 · CLASS';
  var pp=document.getElementById('pproject');
  if(pp)pp.textContent=proj?'📁 '+proj:'';
  var pt=document.getElementById('pteam');
  if(pt){var parts=[];if(team)parts.push('👥 '+team);if(sup)parts.push('👨‍🏫 '+sup);pt.textContent=parts.join(' · ');}
}
function doLogout(){
  var keys=['df_registered','df_student_name','df_reg_no','df_class','df_project_name','df_team','df_supervisor','df_registered_at','df_welcome_seen'];
  keys.forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});
  location.href='login.html';
}
function renderStats(){var done=submittedCount();var eb=earnedBadges();var stats=[['Phases',done+'/5'],['Quizzes',String(done)],['Streak','7'],['XP',String(done*20)]];document.getElementById('stats').innerHTML=stats.map(function(s){return '<div class="stat"><b>'+s[1]+'</b><span>'+s[0]+'</span></div>';}).join('');document.getElementById('earned').textContent=String(eb);}
function renderBadges(){ }
function renderProject(){ }
(function(){if(ls('df_registered')!=='true'){location.href='login.html';return;}renderHeader();renderStats();renderBadges();renderProject();})();
</script>
</body>
</html>
