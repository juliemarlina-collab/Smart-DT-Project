<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart DT Project — Loading">

  <title>Smart DT Project</title>

  <!--
    index.html — Router only.
    This page has no visible content.
    It reads localStorage and redirects immediately:
      df_registered === "true"  →  dashboard.html
      anything else             →  welcome.html

    js/data.js is the only script needed here.
    ui.js and phase-engine.js are NOT loaded on this page.
  -->

  <style>
    /* Minimal style — shown only for the fraction of a second
       before the redirect fires, or if JS is disabled.        */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #FAFBFC;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Logo mark — inline SVG, no external file needed here */
    .splash-logo {
      width: 56px;
      height: 56px;
    }

    .splash-name {
      font-size: 18px;
      font-weight: 600;
      color: #071B3D;
      letter-spacing: 0.02em;
    }

    /* Teal spinner */
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #E8EDF2;
      border-top-color: #14B8A6;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Message shown only when JavaScript is fully disabled */
    .no-js {
      display: none;
      font-size: 14px;
      color: #6B7280;
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
    }

    noscript .no-js { display: block; }
  </style>
</head>

<body>

  <div class="splash" role="status" aria-label="Loading Smart DT Project">

    <!-- Inline logo so no external SVG request can fail on first load -->
    <svg class="splash-logo" viewBox="0 0 56 56" fill="none"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="56" height="56" rx="14" fill="#071B3D"/>
      <!-- Bulb body -->
      <path d="M28 14C22.477 14 18 18.477 18 24c0 3.72 1.97 6.98 4.9 8.77V36
               a1 1 0 0 0 1 1h8.2a1 1 0 0 0 1-1v-3.23C35.03 30.98 37 27.72 37
               24c0-5.523-4.477-10-9-10z"
            fill="#FF6A3D"/>
      <!-- Bulb base lines -->
      <rect x="23" y="38" width="10" height="2" rx="1" fill="#14B8A6"/>
      <rect x="24" y="41" width="8"  height="2" rx="1" fill="#14B8A6"/>
      <!-- Shine dot -->
      <circle cx="23" cy="21" r="1.5" fill="white" opacity="0.7"/>
    </svg>

    <p class="splash-name">Smart DT Project</p>
    <div class="spinner" aria-hidden="true"></div>

    <noscript>
      <p class="no-js">
        JavaScript is required to use Smart DT Project.<br>
        Please enable JavaScript in your browser settings.
      </p>
    </noscript>

  </div>

  <!--
    Load ONLY data.js here.
    The routing function reads localStorage and redirects.
    No other scripts are needed on this page.
  -->
  <script src="js/data.js"></script>

  <script>
    /**
     * Route the student immediately on page load.
     *
     * Logic:
     *   df_registered === "true"  →  dashboard.html
     *   anything else             →  welcome.html
     *
     * window.DT.isRegistered() is defined in js/data.js.
     * We call it directly here so there is zero dependency on ui.js.
     */
    (function route() {
      try {
        var destination = window.DT.isRegistered()
          ? 'dashboard.html'
          : 'welcome.html';
        window.location.replace(destination);
      } catch (err) {
        /**
         * Fallback: if data.js failed to load for any reason,
         * go to welcome.html so the student is never stuck.
         */
        console.error('Smart DT: routing error —', err);
        window.location.replace('welcome.html');
      }
    }());
  </script>

</body>
</html>
